schema_version = 1
profile = "balanced"

# Technitium DNS integration (leave dns_token empty to disable polling).
dns_host  = "localhost"
dns_port  = 5380
dns_token = ""

# Runtime diagnostics and hardening thresholds.
diagnostics_log_path = "/tmp/nullbyteui/startup-diagnostics.log"
target_fps = 2.0
target_process_cpu_percent = 20.0
target_process_rss_mb = 180
terminal_boot_command = "echo 'NullByte PTY online'; while true; do echo \"$USER@$(hostname):$(pwd) $\"; date '+%F %T'; sleep 2; done"
file_nav_root = "/home/pi"

[regions.top]
plugin = "system_overview"

[regions.left]
plugin = "process_list"

[regions.center]
plugin = "terminal"

[regions.right]
plugin = "technitium_dns_chart"

[regions.bottom]
plugin = "log_stream"
